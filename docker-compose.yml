version: "3.8"

services:
  yt-downloader:
    build: .
    container_name: yt-downloader
    restart: unless-stopped
    ports:
      - "8080:8080"          # Acesse em: http://<ip-do-umbrel>:8080
    volumes:
      - ./downloads:/app/downloads   # Vídeos baixados ficam aqui
      - ./data:/app/data             # Banco SQLite (histórico)
    environment:
      - DOWNLOAD_DIR=/app/downloads
      - DB_PATH=/app/data/downloads.db
    # Limita uso de memória para proteger o Umbrel
    mem_limit: 512m
    cpus: "1.0"
